esphome:
  name: bedside-dubai
  friendly_name: "Dubai Bedside Controller"
  project:
    name: Mark.BedsideDubai
    version: "1.0"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Bedside-Dubai Hotspot"
    password: "Password123"

i2c:
  sda: 15
  scl: 7
  scan: false
  frequency: 400kHz

pca9554:
  - id: io_expander
    address: 0x20

output:
  - platform: gpio
    id: backlight_pin
    pin:
      pca9554: io_expander
      number: 1
  - platform: gpio
    id: buzzer_pin
    pin:
      pca9554: io_expander
      number: 5

light:
  - platform: binary
    output: backlight_pin
    name: "Display Backlight"
    id: display_backlight

spi:
  clk_pin: 2
  mosi_pin: 1

display:
  - platform: st7701s
    id: main_display
    cs_pin: 42
    de_pin: 40
    hsync_pin: 38
    vsync_pin: 39
    pclk_pin: 41
    pclk_frequency: 12MHz
    invert_colors: true
    reset_pin:
      pca9554: io_expander
      number: 2
    transform:
      mirror_x: true
      mirror_y: true
    pclk_inverted: false
    init_sequence:
      - [0x01]
      - delay 150ms
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xC0, 0x3B, 0x00]
      - [0xC1, 0x0D, 0x02]
      - [0xC2, 0x31, 0x05]
      - [0xCD, 0x08]
      - [0xB0, 0x00, 0x11, 0x18, 0x0E, 0x11, 0x06, 0x07, 0x08, 0x07, 0x22, 0x04, 0x12, 0x0F, 0xAA, 0x31, 0x18]
      - [0xB1, 0x00, 0x11, 0x19, 0x0E, 0x12, 0x07, 0x08, 0x08, 0x08, 0x22, 0x04, 0x11, 0x11, 0xA9, 0x32, 0x18]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]
      - [0xB0, 0x60]
      - [0xB1, 0x32]
      - [0xB2, 0x07]
      - [0xB3, 0x80]
      - [0xB5, 0x49]
      - [0xB7, 0x85]
      - [0xB8, 0x21]
      - [0xC1, 0x78]
      - [0xC2, 0x78]
      - [0xE0, 0x00, 0x1B, 0x02]
      - [0xE1, 0x08, 0xA0, 0x00, 0x00, 0x07, 0xA0, 0x00, 0x00, 0x00, 0x44, 0x44]
      - [0xE2, 0x11, 0x11, 0x44, 0x44, 0xED, 0xA0, 0x00, 0x00, 0xEC, 0xA0, 0x00, 0x00]
      - [0xE3, 0x00, 0x00, 0x11, 0x11]
      - [0xE4, 0x44, 0x44]
      - [0xE5, 0x0A, 0xE9, 0xD8, 0xA0, 0x0C, 0xEB, 0xD8, 0xA0, 0x0E, 0xED, 0xD8, 0xA0, 0x10, 0xEF, 0xD8, 0xA0]
      - [0xE6, 0x00, 0x00, 0x11, 0x11]
      - [0xE7, 0x44, 0x44]
      - [0xE8, 0x09, 0xE8, 0xD8, 0xA0, 0x0B, 0xEA, 0xD8, 0xA0, 0x0D, 0xEC, 0xD8, 0xA0, 0x0F, 0xEE, 0xD8, 0xA0]
      - [0xEB, 0x02, 0x00, 0xE4, 0xE4, 0x88, 0x00, 0x40]
      - [0xEC, 0x3C, 0x00]
      - [0xED, 0xAB, 0x89, 0x76, 0x54, 0x02, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0x20, 0x45, 0x67, 0x98, 0xBA]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x13]
      - [0xE5, 0xE4]
      - [0x3A, 0x60]
    data_pins:
      red: [5, 45, 48, 47, 21]
      green: [14, 13, 12, 11, 10, 9]
      blue: [46, 3, 8, 18, 17]
    dimensions:
      width: 480
      height: 480
    # Adjusting timings to match the Waveshare demo C++ code
    hsync_front_porch: 10
    hsync_pulse_width: 8
    hsync_back_porch: 50
    vsync_front_porch: 10
    vsync_pulse_width: 8
    vsync_back_porch: 20

touchscreen:
  - platform: gt911
    id: main_touch
    interrupt_pin: 16
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    reset_pin:
      pca9554: io_expander
      number: 0
    on_touch:
      - lambda: 'id(screen_awake) = true;'
      - light.turn_on: display_backlight
      - script.execute: reset_sleep_timer

globals:
  - id: screen_awake
    type: bool
    initial_value: "true"

script:
  - id: reset_sleep_timer
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(screen_awake);'
          then:
            - light.turn_on: display_backlight
            - lambda: 'id(screen_awake) = true;'
      - delay: 15s
      - light.turn_off: display_backlight
      - lambda: 'id(screen_awake) = false;'
      - lvgl.widget.hide: obj_torch
      - lvgl.widget.hide: obj_weather_modal
      - lvgl.widget.show: obj_menu_1
      - lvgl.widget.hide: obj_menu_2

sensor:
  - platform: homeassistant
    id: weather_temp
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: label_weather_temp
            text: !lambda |-
              char buf[32];
              sprintf(buf, "%.1f°C", x);
              return std::string(buf);

binary_sensor:
  - platform: homeassistant
    id: state_bedroom_light
    entity_id: light.bedroom_light
    on_press:
      - lvgl.widget.update:
          id: btn_bedroom
          bg_color: 0x388E3C
    on_release:
      - lvgl.widget.update:
          id: btn_bedroom
          bg_color: 0x212121
  - platform: homeassistant
    id: state_all_lights
    entity_id: light.all_lights
    on_press:
      - lvgl.widget.update:
          id: btn_all_off
          bg_color: 0x388E3C
    on_release:
      - lvgl.widget.update:
          id: btn_all_off
          bg_color: 0x212121
  - platform: homeassistant
    id: state_hall_lights
    entity_id: light.hall_lights
    on_press:
      - lvgl.widget.update:
          id: btn_hall_light
          bg_color: 0x388E3C
    on_release:
      - lvgl.widget.update:
          id: btn_hall_light
          bg_color: 0x212121

text_sensor:
  - platform: homeassistant
    id: state_sonos
    entity_id: media_player.mark_s_bedroom
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(state_sonos).state == "playing";'
            then:
              - lvgl.widget.update:
                  id: btn_sonos
                  bg_color: 0x388E3C
            else:
              - lvgl.widget.update:
                  id: btn_sonos
                  bg_color: 0x212121
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    on_value:
      then:
        - lvgl.label.update:
            id: label_weather_cond
            text: !lambda 'return x;'

font:
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48
  - file: "gfonts://Material Icons"
    id: material_48
    size: 48
    glyphs:
      - "\U0000E0F0" # bed
      - "\U0000E8AC" # power_settings_new
      - "\U0000E050" # volume_up / speaker
      - "\U0000E5D2" # menu
      - "\U0000E2EB" # hallway / lightbulb
      - "\U0000E3E4" # flashlight_on
      - "\U0000E534" # cloud
      - "\U0000E5C4" # arrow_back

lvgl:
  log_level: WARN
  theme:
    dark_mode: true
  pages:
    - id: main_page
      scrollbar_mode: "OFF"
      widgets:
        # MENU 1 (Main Menu)
        - obj:
            id: obj_menu_1
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            border_width: 0
            scrollbar_mode: "OFF"
            widgets:
              # Top Left: Bedroom Light
              - button:
                  id: btn_bedroom
                  x: 10
                  y: 10
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - homeassistant.service:
                        service: light.toggle
                        data:
                          entity_id: light.bedroom_light
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E0F0" # bed
                        text_font: material_48
                        text_color: 0xFDA0
                    - label:
                        align: center
                        y: 30
                        text: "Bedroom"
                        text_font: roboto_24
                        text_color: 0xFFFFFF
                        
              # Top Right: All Off
              - button:
                  id: btn_all_off
                  x: 245
                  y: 10
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - homeassistant.service:
                        service: light.turn_off
                        data:
                          entity_id: light.all_lights
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E8AC" # power
                        text_font: material_48
                        text_color: 0x64DF
                    - label:
                        align: center
                        y: 30
                        text: "All Off"
                        text_font: roboto_24
                        text_color: 0xFFFFFF

              # Bottom Left: Sonos Sleep
              - button:
                  id: btn_sonos
                  x: 10
                  y: 245
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - homeassistant.service:
                        service: script.sleep_playlist
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E050" # speaker
                        text_font: material_48
                        text_color: 0xFB2C
                    - label:
                        align: center
                        y: 30
                        text: "Sonos"
                        text_font: roboto_24
                        text_color: 0xFFFFFF

              # Bottom Right: More Menu
              - button:
                  x: 245
                  y: 245
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - lvgl.widget.hide: obj_menu_1
                    - lvgl.widget.show: obj_menu_2
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E5D2" # menu
                        text_font: material_48
                        text_color: 0x9B3F
                    - label:
                        align: center
                        y: 30
                        text: "More"
                        text_font: roboto_24
                        text_color: 0xFFFFFF

        # MENU 2 (More Options)
        - obj:
            id: obj_menu_2
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            border_width: 0
            scrollbar_mode: "OFF"
            hidden: true
            widgets:
              # Top Left: Hall Light
              - button:
                  id: btn_hall_light
                  x: 10
                  y: 10
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - homeassistant.service:
                        service: light.toggle
                        data:
                          entity_id: light.hall_lights
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E2EB" # lightbulb
                        text_font: material_48
                        text_color: 0xFDA0
                    - label:
                        align: center
                        y: 30
                        text: "Hall"
                        text_font: roboto_24
                        text_color: 0xFFFFFF
                        
              # Top Right: Torch (Nightlight)
              - button:
                  x: 245
                  y: 10
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - lvgl.widget.show: obj_torch
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E3E4" # flashlight
                        text_font: material_48
                        text_color: 0x64DF
                    - label:
                        align: center
                        y: 30
                        text: "Torch"
                        text_font: roboto_24
                        text_color: 0xFFFFFF

              # Bottom Left: Weather
              - button:
                  x: 10
                  y: 245
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - lvgl.widget.show: obj_weather_modal
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E534" # cloud
                        text_font: material_48
                        text_color: 0xFB2C
                    - label:
                        align: center
                        y: 30
                        text: "Weather"
                        text_font: roboto_24
                        text_color: 0xFFFFFF

              # Bottom Right: Back
              - button:
                  x: 245
                  y: 245
                  width: 225
                  height: 225
                  bg_color: 0x212121
                  radius: 15
                  on_click:
                    - lvgl.widget.hide: obj_menu_2
                    - lvgl.widget.show: obj_menu_1
                  widgets:
                    - label:
                        align: center
                        y: -20
                        text: "\U0000E5C4" # back arrow
                        text_font: material_48
                        text_color: 0x9B3F
                    - label:
                        align: center
                        y: 30
                        text: "Back"
                        text_font: roboto_24
                        text_color: 0xFFFFFF

        # TORCH LAYER (Full White Screen)
        - obj:
            id: obj_torch
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0xFFFFFF
            hidden: true
            # When tapped, hide the torch screen to reveal the menus
            on_click:
              - lvgl.widget.hide: obj_torch

        # WEATHER MODAL
        - obj:
            id: obj_weather_modal
            align: center
            width: 380
            height: 280
            bg_color: 0x111111
            border_width: 2
            border_color: 0x444444
            radius: 20
            hidden: true
            on_click:
              - lvgl.widget.hide: obj_weather_modal
            widgets:
              - label:
                  align: top_mid
                  y: 30
                  text: "Dubai Weather"
                  text_font: roboto_24
                  text_color: 0xB3B3B3
              - label:
                  id: label_weather_temp
                  align: center
                  y: -20
                  text: "--°C"
                  text_font: roboto_48
                  text_color: 0xFFFFFF
              - label:
                  id: label_weather_cond
                  align: center
                  y: 40
                  text: "Loading..."
                  text_font: roboto_24
                  text_color: 0xFB2C
              - label:
                  align: bottom_mid
                  y: -30
                  text: "Tap to close"
                  text_font: roboto_24
                  text_color: 0x555555
