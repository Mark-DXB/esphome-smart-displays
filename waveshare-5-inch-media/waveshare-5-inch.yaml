# --- THE USER INTERFACE ---

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  bg_color: 0x000000 
  pages:
    - id: main_page
      widgets:
        
        # --- SPEAKER SELECTION TABS ---
        - button:
            id: btn_dining
            checkable: true
            align: top_left
            x: 24
            y: 20
            width: 170
            height: 50
            radius: 25
            bg_color: 0x282828
            checked:
              bg_color: 0x1DB954
            on_click:
              - lambda: 'id(active_speaker) = "media_player.dining_room";'
              - script.execute: refresh_ui
            widgets:
              - label:
                  id: label_btn_dining
                  text: "Dining"
                  align: center
                  text_font: roboto_24
                  text_color: 0xB3B3B3

        - button:
            id: btn_hall
            checkable: true
            align: top_left
            x: 218
            y: 20
            width: 170
            height: 50
            radius: 25
            bg_color: 0x282828
            checked:
              bg_color: 0x1DB954
            on_click:
              - lambda: 'id(active_speaker) = "media_player.hall";'
              - script.execute: refresh_ui
            widgets:
              - label:
                  id: label_btn_hall
                  text: "Hall"
                  align: center
                  text_font: roboto_24
                  text_color: 0xB3B3B3

        - button:
            id: btn_kitchen
            checkable: true
            align: top_left
            x: 412
            y: 20
            width: 170
            height: 50
            radius: 25
            bg_color: 0x282828
            checked:
              bg_color: 0x1DB954
            on_click:
              - lambda: 'id(active_speaker) = "media_player.kitchen";'
              - script.execute: refresh_ui
            widgets:
              - label:
                  id: label_btn_kitchen
                  text: "Kitchen"
                  align: center
                  text_font: roboto_24
                  text_color: 0xB3B3B3

        - button:
            id: btn_tv_room
            checkable: true
            align: top_left
            x: 606
            y: 20
            width: 170
            height: 50
            radius: 25
            bg_color: 0x282828
            checked:
              bg_color: 0x1DB954
            on_click:
              - lambda: 'id(active_speaker) = "media_player.tv_room";'
              - script.execute: refresh_ui
            widgets:
              - label:
                  id: label_btn_tv_room
                  text: "TV Room"
                  align: center
                  text_font: roboto_24
                  text_color: 0xB3B3B3

        # --- TRACK INFO ---
        - label:
            id: label_title
            text: "Waiting for music..."
            text_font: roboto_48
            text_color: 0xFFFFFF
            align: center
            y: -70
            
        - label:
            id: label_artist
            text: "-"
            text_font: roboto_24
            text_color: 0xB3B3B3
            align: center
            y: -15
            
        - bar:
            id: bar_progress
            align: center
            y: 25
            width: 300
            height: 6
            bg_color: 0x3E3E3E
            bg_opa: 100%
            radius: 3
            indicator:
              bg_color: 0xFFFFFF
              radius: 3
            value: 0
            animated: true
            
        - label:
            id: label_track_pos
            align: center
            x: -190
            y: 25
            text: "0:00"
            text_font: roboto_24
            text_color: 0xB3B3B3

        - label:
            id: label_track_length
            align: center
            x: 190
            y: 25
            text: "0:00"
            text_font: roboto_24
            text_color: 0xB3B3B3
            
        # --- TRANSPORT CONTROLS ---
        - button:
            id: btn_play_pause
            align: center
            y: 90
            width: 90
            height: 90
            radius: 45
            bg_color: 0x1DB954
            shadow_width: 20
            shadow_color: 0x1DB954
            shadow_opa: 100%
            pressed:
              bg_color: 0x1ED760
              shadow_width: 30
              shadow_color: 0x1ED760
            on_click:
              - homeassistant.service:
                  service: media_player.media_play_pause
                  data:
                    entity_id: !lambda 'return id(active_speaker);'
            widgets:
              - label:
                  id: label_play_pause
                  text: "\U0000E037"
                  align: center
                  text_font: material_64
                  text_color: 0x000000
                  
        - button:
            align: center
            x: -240
            y: 90
            width: 60
            height: 60
            radius: 30
            bg_color: 0x282828
            pressed:
              bg_color: 0x3E3E3E
            on_click:
              - homeassistant.service:
                  service: media_player.media_seek
                  data:
                    entity_id: !lambda 'return id(active_speaker);'
                    seek_position: "0"
            widgets:
              - label:
                  text: "\U0000E042"
                  align: center
                  text_font: material_36
                  text_color: 0xFFFFFF
                  
        - button:
            align: center
            x: -120
            y: 90
            width: 60
            height: 60
            radius: 30
            bg_color: 0x282828
            pressed:
              bg_color: 0x3E3E3E
            on_click:
              - homeassistant.service:
                  service: media_player.media_previous_track
                  data:
                    entity_id: !lambda 'return id(active_speaker);'
            widgets:
              - label:
                  text: "\U0000E045"
                  align: center
                  text_font: material_36
                  text_color: 0xFFFFFF
                  
        - button:
            align: center
            x: 120
            y: 90
            width: 60
            height: 60
            radius: 30
            bg_color: 0x282828
            pressed:
              bg_color: 0x3E3E3E
            on_click:
              - homeassistant.service:
                  service: media_player.media_next_track
                  data:
                    entity_id: !lambda 'return id(active_speaker);'
            widgets:
              - label:
                  text: "\U0000E044"
                  align: center
                  text_font: material_36
                  text_color: 0xFFFFFF

        # --- VOLUME SLIDER ---
        - slider:
            id: slider_volume
            min_value: 0
            max_value: 100
            x: 225 
            y: 400
            width: 350
            height: 12
            bg_color: 0x535353
            radius: 6
            indicator:
              bg_color: 0xFFFFFF
              radius: 6
            knob:
              bg_color: 0xFFFFFF
              radius: 12
              pad_all: 8
            on_value:
              then:
                - homeassistant.service:
                    service: media_player.volume_set
                    data:
                      entity_id: !lambda 'return id(active_speaker);'
                      volume_level: !lambda 'return to_string(x / 100.0);'

        # --- QUICK ACTIONS ---

        # GROUP BUTTON
        - button:
            align: bottom_left
            x: 30
            y: -30
            width: 180
            height: 50
            radius: 25
            bg_color: 0x282828
            pressed:
              bg_color: 0x3E3E3E
            on_click:
              - script.execute: load_group_ui
              - lvgl.widget.update:
                  id: modal_group
                  hidden: false
            widgets:
              - label:
                  text: "\U0000E328" 
                  align: left_mid
                  x: 15
                  text_font: material_36
                  text_color: 0xFFFFFF
              - label:
                  text: "Group"
                  align: left_mid
                  x: 55
                  text_font: roboto_24
                  text_color: 0xFFFFFF

        # STOP ALL BUTTON
        - button:
            align: bottom_right
            x: -30
            y: -30
            width: 180
            height: 50
            radius: 25
            bg_color: 0x282828
            pressed:
              bg_color: 0x3E3E3E
            on_click:
              - homeassistant.service:
                  service: media_player.media_pause
                  data:
                    entity_id: media_player.dining_room
              - homeassistant.service:
                  service: media_player.media_pause
                  data:
                    entity_id: media_player.hall
              - homeassistant.service:
                  service: media_player.media_pause
                  data:
                    entity_id: media_player.kitchen
              - homeassistant.service:
                  service: media_player.media_pause
                  data:
                    entity_id: media_player.tv_room
            widgets:
              - label:
                  text: "\U0000E047"
                  align: left_mid
                  x: 15
                  text_font: material_36
                  text_color: 0xE22134
              - label:
                  text: "Stop All"
                  align: left_mid
                  x: 55
                  text_font: roboto_24
                  text_color: 0xFFFFFF

        # --- GROUP MODAL OVERLAY ---
        - obj:
            id: modal_group
            width: 800
            height: 480
            bg_color: 0x121212
            hidden: true
            widgets:
              - label:
                  text: "Group Speakers with Active Player"
                  align: top_mid
                  y: 20
                  text_font: roboto_48
                  text_color: 0xFFFFFF

              # Dining Toggle
              - label:
                  text: "Dining"
                  align: top_left
                  x: 50
                  y: 120
                  text_font: roboto_24
                  text_color: 0xFFFFFF
              - switch:
                  id: switch_group_dining
                  align: top_left
                  x: 150
                  y: 110
                  on_value:
                    - lambda: 'id(group_dining_enabled) = x;'

              # Hall Toggle
              - label:
                  text: "Hall"
                  align: top_left
                  x: 450
                  y: 120
                  text_font: roboto_24
                  text_color: 0xFFFFFF
              - switch:
                  id: switch_group_hall
                  align: top_left
                  x: 550
                  y: 110
                  on_value:
                    - lambda: 'id(group_hall_enabled) = x;'

              # Kitchen Toggle
              - label:
                  text: "Kitchen"
                  align: top_left
                  x: 50
                  y: 200
                  text_font: roboto_24
                  text_color: 0xFFFFFF
              - switch:
                  id: switch_group_kitchen
                  align: top_left
                  x: 150
                  y: 190
                  on_value:
                    - lambda: 'id(group_kitchen_enabled) = x;'

              # TV Room Toggle
              - label:
                  text: "TV Room"
                  align: top_left
                  x: 450
                  y: 200
                  text_font: roboto_24
                  text_color: 0xFFFFFF
              - switch:
                  id: switch_group_tv_room
                  align: top_left
                  x: 550
                  y: 190
                  on_value:
                    - lambda: 'id(group_tv_room_enabled) = x;'

              # APPLY BUTTON
              - button:
                  align: bottom_left
                  x: 50
                  y: -50
                  width: 200
                  height: 60
                  radius: 30
                  bg_color: 0x1DB954
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.dining_room";'
                        then:
                          - if:
                              condition:
                                lambda: 'return id(group_dining_enabled);'
                              then:
                                - homeassistant.service:
                                    service: media_player.join
                                    data:
                                      entity_id: !lambda 'return id(active_speaker);'
                                      group_members: "media_player.dining_room"
                              else:
                                - homeassistant.service:
                                    service: media_player.unjoin
                                    data:
                                      entity_id: "media_player.dining_room"
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.hall";'
                        then:
                          - if:
                              condition:
                                lambda: 'return id(group_hall_enabled);'
                              then:
                                - homeassistant.service:
                                    service: media_player.join
                                    data:
                                      entity_id: !lambda 'return id(active_speaker);'
                                      group_members: "media_player.hall"
                              else:
                                - homeassistant.service:
                                    service: media_player.unjoin
                                    data:
                                      entity_id: "media_player.hall"
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.kitchen";'
                        then:
                          - if:
                              condition:
                                lambda: 'return id(group_kitchen_enabled);'
                              then:
                                - homeassistant.service:
                                    service: media_player.join
                                    data:
                                      entity_id: !lambda 'return id(active_speaker);'
                                      group_members: "media_player.kitchen"
                              else:
                                - homeassistant.service:
                                    service: media_player.unjoin
                                    data:
                                      entity_id: "media_player.kitchen"
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.tv_room";'
                        then:
                          - if:
                              condition:
                                lambda: 'return id(group_tv_room_enabled);'
                              then:
                                - homeassistant.service:
                                    service: media_player.join
                                    data:
                                      entity_id: !lambda 'return id(active_speaker);'
                                      group_members: "media_player.tv_room"
                              else:
                                - homeassistant.service:
                                    service: media_player.unjoin
                                    data:
                                      entity_id: "media_player.tv_room"
                    - lvgl.widget.update:
                        id: modal_group
                        hidden: true
                  widgets:
                    - label:
                        text: "Apply Group"
                        align: center
                        text_font: roboto_24
                        text_color: 0x000000

              # UNJOIN ALL BUTTON
              - button:
                  align: bottom_mid
                  y: -50
                  width: 200
                  height: 60
                  radius: 30
                  bg_color: 0xE22134
                  on_click:
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.dining_room";'
                        then:
                          - homeassistant.service:
                              service: media_player.unjoin
                              data:
                                entity_id: "media_player.dining_room"
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.hall";'
                        then:
                          - homeassistant.service:
                              service: media_player.unjoin
                              data:
                                entity_id: "media_player.hall"
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.kitchen";'
                        then:
                          - homeassistant.service:
                              service: media_player.unjoin
                              data:
                                entity_id: "media_player.kitchen"
                    - if:
                        condition:
                          lambda: 'return id(active_speaker) != "media_player.tv_room";'
                        then:
                          - homeassistant.service:
                              service: media_player.unjoin
                              data:
                                entity_id: "media_player.tv_room"
                    - lvgl.widget.update:
                        id: modal_group
                        hidden: true
                  widgets:
                    - label:
                        text: "Unjoin All"
                        align: center
                        text_font: roboto_24
                        text_color: 0xFFFFFF

              # CANCEL BUTTON
              - button:
                  align: bottom_right
                  x: -50
                  y: -50
                  width: 200
                  height: 60
                  radius: 30
                  bg_color: 0x282828
                  on_click:
                    - lvgl.widget.update:
                        id: modal_group
                        hidden: true
                  widgets:
                    - label:
                        text: "Cancel"
                        align: center
                        text_font: roboto_24
                        text_color: 0xFFFFFF

        # --- SECRET RESET BUTTON ---
        - obj:
            width: 50
            height: 50
            align: top_left
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - button.press: secret_reset_btn

        # --- SLEEP SHIELD ---
        # Drawn absolutely last so it sits visually on top of everything else
        - obj:
            id: sleep_shield
            width: 800
            height: 480
            bg_opa: TRANSP
            border_width: 0
            outline_width: 0
            hidden: true
            on_click:
              - script.execute: reset_sleep_timer
