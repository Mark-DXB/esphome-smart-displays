esphome:
  name: waveshare-5-screen
  friendly_name: Waveshare 5 Inch Display
  on_boot:
    priority: -100
    then:
      - switch.turn_off: backlight_switch
      - delay: 100ms
      - switch.turn_on: backlight_switch
      - delay: 100ms
      - script.execute: reset_sleep_timer

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  ap:
    ssid: "Waveshare-5 Fallback"
    password: !secret wifi_password

captive_portal:

logger:

api:
  encryption:
    key: !secret waveshare-5-screen__api_key

ota:
  - platform: esphome

# --- HARDWARE CONFIGURATION ---

i2c:
  id: bus_a
  sda: GPIO8
  scl: GPIO9
  scan: false
  frequency: 100kHz

ch422g:
  - id: ch422g_hub

switch:
  - platform: gpio
    name: "Display Backlight"
    id: backlight_switch
    restore_mode: ALWAYS_ON
    pin:
      ch422g: ch422g_hub
      number: 2

button:
  - platform: restart
    id: secret_reset_btn
    name: "Secret Reset"

font:
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48
  - file: "gfonts://Material Icons"
    id: material_36
    size: 36
    glyphs:
      - "\U0000E037"
      - "\U0000E034"
      - "\U0000E045"
      - "\U0000E044"
      - "\U0000E047"
      - "\U0000E042"
      - "\U0000E328"
  - file: "gfonts://Material Icons"
    id: material_64
    size: 64
    glyphs:
      - "\U0000E037"
      - "\U0000E034"

display:
  - platform: mipi_rgb
    id: main_display
    model: CUSTOM
    spi_id: dummy_spi
    init_sequence: []
    dimensions:
      width: 800
      height: 480
    data_pins:
      red: [GPIO1, GPIO2, GPIO42, GPIO41, GPIO40]
      green: [GPIO39, GPIO0, GPIO45, GPIO48, GPIO47, GPIO21]
      blue: [GPIO14, GPIO38, GPIO18, GPIO17, GPIO10]
    de_pin: GPIO5
    pclk_pin: GPIO7
    hsync_pin: GPIO46
    vsync_pin: GPIO3
    reset_pin:
      ch422g: ch422g_hub
      number: 3
    pclk_frequency: 16MHz
    hsync_front_porch: 40
    hsync_pulse_width: 48
    hsync_back_porch: 40
    vsync_front_porch: 13
    vsync_pulse_width: 3
    vsync_back_porch: 29

touchscreen:
  platform: gt911
  id: main_touch
  interrupt_pin: GPIO4
  reset_pin:
    ch422g: ch422g_hub
    number: 1
  on_touch:
    - script.execute: reset_sleep_timer

spi:
  id: dummy_spi
  clk_pin: GPIO11
  mosi_pin: GPIO12

# --- SYSTEM GLOBALS & SCRIPTS ---

globals:
  - id: active_speaker
    type: std::string
    initial_value: '"media_player.dining_room"'
  - id: ignore_slider
    type: bool
    initial_value: "false"
  - id: group_dining_enabled
    type: bool
    initial_value: "false"
  - id: group_hall_enabled
    type: bool
    initial_value: "false"
  - id: group_kitchen_enabled
    type: bool
    initial_value: "false"
  - id: group_tv_room_enabled
    type: bool
    initial_value: "false"
  - id: screen_awake
    type: bool
    initial_value: "true"

  - id: current_track_position
    type: float
    initial_value: "0.0"
  - id: current_track_duration
    type: float
    initial_value: "0.0"

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              std::string st = "idle";
              if (id(active_speaker) == "media_player.dining_room") st = id(dining_state).state;
              else if (id(active_speaker) == "media_player.hall") st = id(hall_state).state;
              else if (id(active_speaker) == "media_player.kitchen") st = id(kitchen_state).state;
              else st = id(tv_state).state;
              return st == "playing";
          then:
            - lambda: 'if (!std::isnan(id(current_track_position))) id(current_track_position) += 1.0;'
            - lvgl.bar.update:
                id: bar_progress
                value: !lambda |-
                  if (id(current_track_duration) <= 0 || std::isnan(id(current_track_duration))) return 0;
                  if (std::isnan(id(current_track_position))) return 0;
                  float pct = (id(current_track_position) / id(current_track_duration)) * 100.0;
                  return (pct > 100.0) ? 100.0 : pct;
            - lvgl.label.update:
                id: label_track_pos
                text: !lambda |-
                  if (std::isnan(id(current_track_position))) return std::string("0:00");
                  int pos_secs = (int)id(current_track_position);
                  char buf[10];
                  sprintf(buf, "%d:%02d", pos_secs / 60, pos_secs % 60);
                  return std::string(buf);

script:
  - id: reset_sleep_timer
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(screen_awake);'
          then:
            - switch.turn_on: backlight_switch
            - delay: 150ms
            - lvgl.resume:
            - lvgl.widget.update:
                id: sleep_shield
                hidden: true
            - lambda: 'id(screen_awake) = true;'
      - delay: 30s
      - lvgl.widget.update:
          id: sleep_shield
          hidden: false
      - lvgl.pause:
      - switch.turn_off: backlight_switch
      - lambda: 'id(screen_awake) = false;'

  - id: load_group_ui
    then:
      - lambda: |-
          std::string m = "";
          if (id(active_speaker) == "media_player.dining_room") m = id(dining_group).state;
          else if (id(active_speaker) == "media_player.hall") m = id(hall_group).state;
          else if (id(active_speaker) == "media_player.kitchen") m = id(kitchen_group).state;
          else m = id(tv_group).state;
          id(group_dining_enabled) = (m.find("media_player.dining_room") != std::string::npos);
          id(group_hall_enabled) = (m.find("media_player.hall") != std::string::npos);
          id(group_kitchen_enabled) = (m.find("media_player.kitchen") != std::string::npos);
          id(group_tv_room_enabled) = (m.find("media_player.tv_room") != std::string::npos);
      - lvgl.widget.update:
          id: switch_group_dining
          state:
            checked: !lambda 'return id(group_dining_enabled);'
      - lvgl.widget.update:
          id: switch_group_hall
          state:
            checked: !lambda 'return id(group_hall_enabled);'
      - lvgl.widget.update:
          id: switch_group_kitchen
          state:
            checked: !lambda 'return id(group_kitchen_enabled);'
      - lvgl.widget.update:
          id: switch_group_tv_room
          state:
            checked: !lambda 'return id(group_tv_room_enabled);'

  - id: refresh_ui
    mode: restart
    then:
      - lambda: |-
          if (id(active_speaker) == "media_player.dining_room") {
            id(current_track_duration) = id(dining_duration).state;
            id(current_track_position) = id(dining_position).state;
          } else if (id(active_speaker) == "media_player.hall") {
            id(current_track_duration) = id(hall_duration).state;
            id(current_track_position) = id(hall_position).state;
          } else if (id(active_speaker) == "media_player.kitchen") {
            id(current_track_duration) = id(kitchen_duration).state;
            id(current_track_position) = id(kitchen_position).state;
          } else {
            id(current_track_duration) = id(tv_duration).state;
            id(current_track_position) = id(tv_position).state;
          }
      - lvgl.bar.update:
          id: bar_progress
          value: !lambda |-
            if (id(current_track_duration) <= 0 || std::isnan(id(current_track_duration))) return 0;
            if (std::isnan(id(current_track_position))) return 0;
            float pct = (id(current_track_position) / id(current_track_duration)) * 100.0;
            return (pct > 100.0) ? 100.0 : pct;
      - lvgl.label.update:
          id: label_track_pos
          text: !lambda |-
            if (std::isnan(id(current_track_position))) return std::string("0:00");
            int pos_secs = (int)id(current_track_position);
            char buf[10];
            sprintf(buf, "%d:%02d", pos_secs / 60, pos_secs % 60);
            return std::string(buf);
      - lvgl.label.update:
          id: label_track_length
          text: !lambda |-
            if (id(current_track_duration) <= 0 || std::isnan(id(current_track_duration))) return std::string("0:00");
            int dur_secs = (int)id(current_track_duration);
            char buf[10];
            sprintf(buf, "%d:%02d", dur_secs / 60, dur_secs % 60);
            return std::string(buf);
      - lvgl.label.update:
          id: label_title
          text: !lambda |-
            if (id(active_speaker) == "media_player.dining_room") return id(dining_title).state;
            if (id(active_speaker) == "media_player.hall") return id(hall_title).state;
            if (id(active_speaker) == "media_player.kitchen") return id(kitchen_title).state;
            return id(tv_title).state;
      - lvgl.label.update:
          id: label_artist
          text: !lambda |-
            if (id(active_speaker) == "media_player.dining_room") return id(dining_artist).state;
            if (id(active_speaker) == "media_player.hall") return id(hall_artist).state;
            if (id(active_speaker) == "media_player.kitchen") return id(kitchen_artist).state;
            return id(tv_artist).state;
      - lvgl.label.update:
          id: label_play_pause
          text: !lambda |-
            std::string st = "idle";
            if (id(active_speaker) == "media_player.dining_room") st = id(dining_state).state;
            else if (id(active_speaker) == "media_player.hall") st = id(hall_state).state;
            else if (id(active_speaker) == "media_player.kitchen") st = id(kitchen_state).state;
            else st = id(tv_state).state;
            return st == "playing" ? std::string("\U0000E034") : std::string("\U0000E037");
      - if:
          condition:
            lambda: |-
              float vol = 0.0;
              if (id(active_speaker) == "media_player.dining_room") { vol = id(dining_volume).state; }
              else if (id(active_speaker) == "media_player.hall") { vol = id(hall_volume).state; }
              else if (id(active_speaker) == "media_player.kitchen") { vol = id(kitchen_volume).state; }
              else { vol = id(tv_volume).state; }
              return !std::isnan(vol);
          then:
            - lambda: 'id(ignore_slider) = true;'
            - lvgl.slider.update:
                id: slider_volume
                value: !lambda |-
                  float vol = 0.0;
                  if (id(active_speaker) == "media_player.dining_room") { vol = id(dining_volume).state; }
                  else if (id(active_speaker) == "media_player.hall") { vol = id(hall_volume).state; }
                  else if (id(active_speaker) == "media_player.kitchen") { vol = id(kitchen_volume).state; }
                  else { vol = id(tv_volume).state; }
                  return vol * 100.0;
            - delay: 100ms
            - lambda: 'id(ignore_slider) = false;'
      - lvgl.widget.update:
          id: btn_dining
          state:
            checked: !lambda 'return id(active_speaker) == "media_player.dining_room";'
      - lvgl.widget.update:
          id: btn_hall
          state:
            checked: !lambda 'return id(active_speaker) == "media_player.hall";'
      - lvgl.widget.update:
          id: btn_kitchen
          state:
            checked: !lambda 'return id(active_speaker) == "media_player.kitchen";'
      - lvgl.widget.update:
          id: btn_tv_room
          state:
            checked: !lambda 'return id(active_speaker) == "media_player.tv_room";'
      - lvgl.label.update:
          id: label_btn_dining
          text_color: !lambda 'return id(active_speaker) == "media_player.dining_room" ? lv_color_hex(0xFFFFFF) : lv_color_hex(0xB3B3B3);'
      - lvgl.label.update:
          id: label_btn_hall
          text_color: !lambda 'return id(active_speaker) == "media_player.hall" ? lv_color_hex(0xFFFFFF) : lv_color_hex(0xB3B3B3);'
      - lvgl.label.update:
          id: label_btn_kitchen
          text_color: !lambda 'return id(active_speaker) == "media_player.kitchen" ? lv_color_hex(0xFFFFFF) : lv_color_hex(0xB3B3B3);'
      - lvgl.label.update:
          id: label_btn_tv_room
          text_color: !lambda 'return id(active_speaker) == "media_player.tv_room" ? lv_color_hex(0xFFFFFF) : lv_color_hex(0xB3B3B3);'

